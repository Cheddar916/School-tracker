<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Application & Financial Aid Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Source+Code+Pro:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0f1419;
            --surface: #1a1f2e;
            --surface-light: #252d3d;
            --accent: #00d4ff;
            --accent-dark: #0099cc;
            --text: #e0e6ed;
            --text-muted: #8892a8;
            --success: #00ff88;
            --warning: #ffaa00;
            --danger: #ff3333;
            --gold: #ffd700;
            --green-light: #90ee90;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }

        header {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(0,212,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--accent) 0%, #00ff88 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        header p { color: var(--text-muted); font-size: 0.95em; }

        /* ===== TAB NAV ===== */
        .main-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.1);
        }
        .main-tab {
            flex: 1;
            min-width: 150px;
            padding: 12px 20px;
            background: var(--surface-light);
            color: var(--text-muted);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .tab-icon { font-size: 1.2em; }
        .main-tab:hover { background: rgba(0,212,255,0.1); border-color: var(--accent); color: var(--accent); }
        .main-tab.active {
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
            color: var(--bg);
            border-color: var(--accent);
        }

        .tab-panel { display: none; animation: fadeIn 0.3s ease; }
        .tab-panel.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ===== CARDS & GRIDS ===== */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .card {
            background: var(--surface);
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }
        .card:hover { border-color: var(--accent); box-shadow: 0 8px 32px rgba(0,212,255,0.15); }
        .card h3 { margin-bottom: 15px; color: var(--accent); display: flex; align-items: center; gap: 10px; }

        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

        /* ===== INSIGHT CARD ===== */
        .insight-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .insight-card h3 { color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .insight-card p { margin: 8px 0; line-height: 1.6; font-size: 0.95em; }
        .insight-highlight { color: var(--success); font-weight: 700; }
        .insight-warning { color: var(--warning); font-weight: 700; }
        .insight-info { color: var(--accent); font-weight: 600; }

        /* ===== TABLES ===== */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
            background: var(--surface);
            border-radius: 8px;
            overflow: hidden;
        }
        th {
            background: var(--surface-light);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            color: var(--accent);
            border-bottom: 2px solid rgba(0,212,255,0.2);
            cursor: pointer;
            user-select: none;
        }
        th:hover { background: rgba(0,212,255,0.1); }
        td { padding: 12px; border-bottom: 1px solid rgba(0,212,255,0.1); }
        tr:last-child td { border-bottom: none; }

        /* ===== STATUS BADGES ===== */
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .status-accepted { background: rgba(0,255,136,0.2); color: var(--success); }
        .status-pending { background: rgba(255,170,0,0.2); color: var(--warning); }
        .status-rejected { background: rgba(255,51,51,0.2); color: var(--danger); }
        .status-deferred { background: rgba(0,212,255,0.2); color: var(--accent); }

        /* ===== BUTTONS ===== */
        button {
            background: linear-gradient(135deg, var(--accent-dark) 0%, var(--accent) 100%);
            color: var(--bg);
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,212,255,0.3); }
        button.secondary {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid rgba(0,212,255,0.3);
        }
        button.secondary:hover { border-color: var(--accent); background: rgba(0,212,255,0.1); }
        button.danger-btn { background: linear-gradient(135deg, #cc2200 0%, var(--danger) 100%); }

        /* ===== FORM ELEMENTS ===== */
        input, select, textarea {
            background: var(--surface-light);
            color: var(--text);
            border: 1px solid rgba(0,212,255,0.2);
            padding: 10px;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95em;
            transition: all 0.3s ease;
            width: 100%;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 12px rgba(0,212,255,0.2);
        }
        input[readonly] { opacity: 0.6; cursor: not-allowed; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--accent); font-weight: 600; font-size: 0.9em; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: var(--surface);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.1);
            align-items: center;
        }
        .filter-bar label { color: var(--text-muted); white-space: nowrap; font-size: 0.9em; }
        .filter-bar select { width: auto; min-width: 160px; }
        .filter-pill {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid rgba(0,212,255,0.3);
            background: var(--surface-light);
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85em;
            font-family: 'Poppins', sans-serif;
            transition: all 0.2s;
        }
        .filter-pill.active { background: rgba(0,212,255,0.2); color: var(--accent); border-color: var(--accent); }
        .filter-pill:hover { border-color: var(--accent); color: var(--accent); }

        /* ===== COST TABLE COLORS ===== */
        .cost-row-cheap { background: rgba(0,255,136,0.06); }
        .cost-row-mid { background: rgba(255,170,0,0.06); }
        .cost-row-expensive { background: rgba(255,51,51,0.06); }
        .cost-row-cheap:hover { background: rgba(0,255,136,0.12) !important; }
        .cost-row-mid:hover { background: rgba(255,170,0,0.12) !important; }
        .cost-row-expensive:hover { background: rgba(255,51,51,0.12) !important; }

        /* ===== EXPANDABLE ROWS ===== */
        .expandable { cursor: pointer; user-select: none; }
        .details-row { display: none; background: rgba(0,0,0,0.3); }
        .details-row.expanded { display: table-row; }
        .details-content {
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }
        .detail-item {
            background: var(--surface-light);
            padding: 10px;
            border-radius: 6px;
            border-left: 3px solid var(--accent);
        }
        .detail-item label { display: block; font-size: 0.75em; color: var(--text-muted); margin-bottom: 4px; }
        .detail-item .value { font-weight: 600; color: var(--accent); font-size: 1.05em; }
        .detail-item.green-border { border-left-color: var(--success); }
        .detail-item.green-border .value { color: var(--success); }
        .detail-item.orange-border { border-left-color: var(--warning); }
        .detail-item.orange-border .value { color: var(--warning); }
        .detail-item.red-border { border-left-color: var(--danger); }
        .detail-item.red-border .value { color: var(--danger); }

        /* ===== EXPAND INDICATOR ===== */
        .expand-icon { transition: transform 0.2s; display: inline-block; }
        .expand-icon.open { transform: rotate(90deg); }

        /* ===== CHART CONTAINERS ===== */
        .chart-container {
            background: var(--surface);
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .chart-container h3 { color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .chart-wrap { position: relative; }
        .chart-wrap canvas { max-height: 340px; }

        /* ===== AID ENTRY FORM ===== */
        .aid-form-card {
            background: var(--surface);
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .aid-form-card h3 { color: var(--accent); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .calc-row {
            background: var(--surface-light);
            border-radius: 6px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            border-left: 3px solid var(--accent);
        }
        .calc-row.total-row { border-left-color: var(--success); }
        .calc-row.oop-row { border-left-color: var(--danger); }
        .calc-row label { color: var(--text-muted); font-size: 0.9em; }
        .calc-row .calc-val { font-weight: 700; font-size: 1.1em; color: var(--accent); }
        .calc-row.total-row .calc-val { color: var(--success); }
        .calc-row.oop-row .calc-val { color: var(--danger); }

        /* ===== AID DEADLINE TRACKER ===== */
        .deadline-urgency-red { color: var(--danger); font-weight: 700; }
        .deadline-urgency-yellow { color: var(--warning); font-weight: 600; }
        .deadline-urgency-green { color: var(--success); }
        .deadline-urgency-gray { color: var(--text-muted); }

        .received-check { accent-color: var(--success); width: 18px; height: 18px; cursor: pointer; }

        /* ===== STATS ROW ===== */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface);
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .stat-label { color: var(--text-muted); font-size: 0.8em; margin-bottom: 8px; }
        .stat-value { color: var(--accent); font-size: 1.6em; font-weight: 700; }
        .stat-value.green { color: var(--success); }
        .stat-value.red { color: var(--danger); }
        .stat-value.yellow { color: var(--warning); }

        /* ===== MATCH BADGE ===== */
        .match-badge { display: inline-block; padding: 6px 12px; border-radius: 4px; font-weight: 600; font-size: 0.85em; }
        .match-high { background: rgba(0,255,136,0.2); color: var(--success); }
        .match-medium { background: rgba(255,170,0,0.2); color: var(--warning); }
        .match-low { background: rgba(255,51,51,0.2); color: var(--danger); }

        /* ===== AMOUNT ===== */
        .amount-currency { color: var(--success); font-weight: 600; }

        /* ===== SCHOLARSHIP TABLE ===== */
        .status-select { padding: 6px 10px; font-size: 0.9em; width: auto; }

        /* ===== DEAL BREAKERS ===== */
        .dealbreaker-section {
            background: var(--surface);
            border: 1px solid rgba(0,212,255,0.1);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .dealbreaker-section h4 { color: var(--accent); margin-bottom: 12px; }
        .dealbreaker-item { display: flex; align-items: center; gap: 10px; padding: 8px 0; }
        .dealbreaker-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
        .dealbreaker-item label { flex: 1; cursor: pointer; margin: 0; }
        .eliminated { background: rgba(255,51,51,0.1); border-left: 4px solid var(--danger); }

        /* ===== JOURNAL ===== */
        .journal-entry {
            background: var(--surface);
            border-left: 4px solid var(--accent);
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .journal-entry-date { color: var(--text-muted); font-size: 0.85em; margin-bottom: 8px; }
        .journal-entry-text { color: var(--text); line-height: 1.6; margin-bottom: 8px; }
        .journal-entry-tag {
            display: inline-block;
            background: rgba(0,212,255,0.2);
            color: var(--accent);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8em;
            margin-right: 5px;
        }

        /* ===== DEADLINE COUNTDOWN BANNER ===== */
        .deadline-countdown-banner {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            border-left: 4px solid var(--accent);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .deadline-countdown-banner.warning { border-left-color: var(--warning); background: linear-gradient(135deg, rgba(255,170,0,0.1) 0%, rgba(255,170,0,0.05) 100%); }
        .deadline-countdown-banner.danger { border-left-color: var(--danger); background: linear-gradient(135deg, rgba(255,51,51,0.1) 0%, rgba(255,51,51,0.05) 100%); }
        .deadline-countdown-banner h3 { margin-bottom: 15px; }
        .deadline-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.1); font-size: 0.9em; }
        .deadline-item:last-child { border-bottom: none; }

        /* ===== SCHOLARSHIP CARD ===== */
        .scholarship-card {
            background: linear-gradient(135deg, var(--surface) 0%, var(--surface-light) 100%);
            border: 2px solid var(--accent);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .scholarship-card-row { display: flex; justify-content: space-between; align-items: center; margin: 10px 0; padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .scholarship-card-row:last-child { border-bottom: none; }
        .scholarship-card-label { color: var(--text-muted); font-size: 0.9em; }
        .scholarship-card-value { color: var(--accent); font-weight: 600; }

        /* ===== SCHOLARSHIP FILTERS ===== */
        .scholarship-filters { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; background: var(--surface); padding: 15px; border-radius: 8px; border: 1px solid rgba(0,212,255,0.1); }
        .scholarship-filters .filter-group { display: flex; gap: 8px; align-items: center; }
        .scholarship-filters select { min-width: 140px; width: auto; }

        /* ===== COMPARISON ===== */
        .comparison-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
        .comparison-card { background: var(--surface); border: 2px solid var(--accent); border-radius: 8px; padding: 20px; }
        .comparison-card h4 { color: var(--accent); margin-bottom: 15px; font-size: 1.2em; }
        .comparison-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.1); }
        .comparison-item:last-child { border-bottom: none; }
        .comparison-item label { color: var(--text-muted); font-size: 0.9em; }
        .comparison-item .value { color: var(--accent); font-weight: 600; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .two-col { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            header h1 { font-size: 1.8em; }
            .grid { grid-template-columns: 1fr; }
            .form-row { grid-template-columns: 1fr; }
            .comparison-cards { grid-template-columns: 1fr; }
            table { font-size: 0.85em; }
            .main-tab { min-width: 120px; padding: 10px 15px; }
            .tab-icon { font-size: 1em; }
            td, th { padding: 8px; }
        }
    </style>
</head>

    <header>

    <div class="tab-panel" id="analytics-panel"></div>
    <div class="tab-panel" id="scholarships-panel"></div>
</div>

function loadLocalData() {
    const saved = localStorage.getItem('st_schools_v2');
    if (saved) {
        const data = JSON.parse(saved);
        window.schools   = data.schools        || JSON.parse(JSON.stringify(FALLBACK_DATA.schools));
        window.aidPkgs   = data.aid_packages   || {};
        dealBreakers      = data.dealbreakers   || {};
        journalEntries    = data.journal_entries|| [];
        aidDeadlines      = data.aid_deadlines  || {};
    } else {
        window.schools   = JSON.parse(JSON.stringify(FALLBACK_DATA.schools));
        window.aidPkgs   = {};
        dealBreakers      = {};
        journalEntries    = [];
        aidDeadlines      = {};
    }
    const sch = localStorage.getItem('st_scholarships');
    if (sch) {
        const schData = JSON.parse(sch);
        SCHOLARSHIP_DB.forEach(s => {
            const found = schData.find(x => x.id === s.id);
            if (found) { s.status = found.status; s.notes = found.notes || ""; }
        });
    }
}

function saveLocalData() {
    const data = {
        schools: window.schools,
        aid_packages: window.aidPkgs,
        dealbreakers: dealBreakers,
        journal_entries: journalEntries,
        aid_deadlines: aidDeadlines
    };
    localStorage.setItem('st_schools_v2', JSON.stringify(data));
    const schData = SCHOLARSHIP_DB.map(s => ({ id: s.id, status: s.status, notes: s.notes || "" }));
    localStorage.setItem('st_scholarships', JSON.stringify(schData));
}

function switchMainTab(tab) {
    currentMainTab = tab;
    renderFull();
}

const TAB_NAMES = { applications:'Applications', financial:'Financial', analytics:'Analytics', scholarships:'Scholarship' };

function renderFull() {
    // Update tab button states
    document.querySelectorAll('.main-tab').forEach(btn => {
        btn.classList.remove('active');
        if (btn.textContent.trim().includes(TAB_NAMES[currentMainTab])) {
            btn.classList.add('active');
        }
    });

    // Render panels
    document.getElementById('applications-panel').innerHTML = renderApplicationsTab();
    document.getElementById('financial-panel').innerHTML    = renderFinancialTab();
    document.getElementById('analytics-panel').innerHTML    = renderAnalyticsTab();
    document.getElementById('scholarships-panel').innerHTML = renderScholarshipTab();

    // Show active panel
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    const tabMap = { applications:0, financial:1, analytics:2, scholarships:3 };
    document.querySelectorAll('.tab-panel')[tabMap[currentMainTab]].classList.add('active');

    // Init charts after DOM update
    if (currentMainTab === 'financial') {
        setTimeout(() => {
            initBarChart();
            initPieChart();
        }, 50);
    }
}

// HELPERS
// ============================================================
function fmt(n) { return '$' + (n || 0).toLocaleString(); }

function calcNetCost(schoolId) {
    const aid = window.aidPkgs[schoolId] || {};
    const coa = BASE_COSTS[schoolId] || 40000;
    const grants = (aid.pell || 0) + (aid.cal_grant || 0) + (aid.school_grants || 0) + (aid.other || 0);
    return Math.max(0, coa - grants);
}

function calcOOP(schoolId) {
    const aid = window.aidPkgs[schoolId] || {};
    const net = calcNetCost(schoolId);
    return Math.max(0, net - (aid.work_study || 0) - (aid.loans || 0));
}

function daysUntil(dateStr) {
    if (!dateStr) return null;
    const today = new Date(); today.setHours(0,0,0,0);
    const d = new Date(dateStr); d.setHours(0,0,0,0);
    return Math.ceil((d - today) / 86400000);
}

function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function renderApplicationsTab() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    const pending  = window.schools.filter(s => s.status === 'pending');
    const rejected = window.schools.filter(s => s.status === 'rejected');
    const deferred = window.schools.filter(s => s.status === 'deferred');

    let html = `
    <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Total Schools</div><div class="stat-value">${window.schools.length}</div></div>
        <div class="stat-card"><div class="stat-label">Accepted</div><div class="stat-value green">${accepted.length}</div></div>
        <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value yellow">${pending.length}</div></div>
        <div class="stat-card"><div class="stat-label">Decisions Left</div><div class="stat-value yellow">${pending.length + deferred.length}</div></div>
    </div>`;

    html += '<div class="grid">';
    [...accepted, ...pending, ...rejected, ...deferred].forEach(school => {
        html += renderCard(school);
    });
    html += '</div>';
    return html;
}

function renderCard(school) {
    const statusColors = { accepted:'status-accepted', pending:'status-pending', rejected:'status-rejected', deferred:'status-deferred' };
    const netCost = calcNetCost(school.id);
    const coa = BASE_COSTS[school.id] || 0;
    return `
    <div class="card">
        <h3>${school.name}</h3>
        <p style="margin-bottom:12px;">
            <span class="status-badge ${statusColors[school.status] || ''}">${school.status.charAt(0).toUpperCase()+school.status.slice(1)}</span>
            ${school.status === 'accepted' ? `<span style="margin-left:8px;color:var(--text-muted);font-size:0.85em;">COA: ${fmt(coa)} · Net: ${fmt(netCost)}</span>` : ''}
        </p>
        <div class="form-group">
            <label>Notes / Feedback</label>
            <textarea style="min-height:80px;" onchange="storeFeedback('${school.id}', this.value)">${school.feedback || ''}</textarea>
        </div>
        <div class="form-group">
            <label>Update Status</label>
            <select onchange="overrideStatus('${school.id}', this.value)">
                <option value="pending"  ${school.status==='pending'  ? 'selected':''}>Pending</option>
                <option value="accepted" ${school.status==='accepted' ? 'selected':''}>Accepted</option>
                <option value="rejected" ${school.status==='rejected' ? 'selected':''}>Rejected</option>
                <option value="deferred" ${school.status==='deferred' ? 'selected':''}>Deferred/Waitlisted</option>
            </select>
        </div>
    </div>`;
}

function storeFeedback(id, fb) {
    const s = window.schools.find(x => x.id === id);
    if (s) { s.feedback = fb; saveLocalData(); }
}

function overrideStatus(id, status) {
    const s = window.schools.find(x => x.id === id);
    if (s) { s.status = status; saveLocalData(); renderFull(); }
}

function renderFinancialInsights() {
    const allSchools = window.schools;
    const accepted = window.schools.filter(s => s.status === 'accepted');

    const withCOA = allSchools.map(s => ({ id: s.id, name: s.name, coa: BASE_COSTS[s.id] || 0, net: calcNetCost(s.id), oop: calcOOP(s.id), status: s.status }));
    const cheapestCOA = [...withCOA].sort((a,b) => a.coa - b.coa)[0];
    const cheapestNet = [...withCOA].sort((a,b) => a.net - b.net)[0];
    const priciest    = [...withCOA].sort((a,b) => b.coa - a.coa)[0];

    const accData = accepted.map(s => ({ name: s.name, net: calcNetCost(s.id) }));
    const avgNet = accData.length ? Math.round(accData.reduce((s,x)=>s+x.net,0) / accData.length) : null;

    return `
    <div class="insight-card">
        <h3>💡 Smart Financial Insights</h3>
        <p>Cheapest total COA: <span class="insight-highlight">${cheapestCOA.name} (${fmt(cheapestCOA.coa)})</span></p>
        <p>Cheapest net cost (after grants): <span class="insight-highlight">${cheapestNet.name} (${fmt(cheapestNet.net)})</span></p>
        <p>Most expensive: <span class="insight-warning">${priciest.name} (${fmt(priciest.coa)}) — ${fmt(priciest.coa - cheapestCOA.coa)} more than cheapest</span></p>
        ${avgNet !== null ? `<p>Average net cost across accepted schools: <span class="insight-warning">${fmt(avgNet)}</span></p>` : ''}
        <p><span class="insight-info">💡 Cal Grant A (~$9,084) applies to UC & CSU schools — verify with each school's aid office</span></p>
        <p><span class="insight-info">📋 Your Pell Grant ($7,395) follows you to any school. Enter aid packages below to see real net costs.</span></p>
    </div>`;
}

function renderFinancialStats() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    const totalAid = accepted.reduce((sum, s) => {
        const aid = window.aidPkgs[s.id] || {};
        return sum + (aid.pell||0) + (aid.cal_grant||0) + (aid.school_grants||0) + (aid.other||0);
    }, 0);
    const avgOOP = accepted.length
        ? Math.round(accepted.reduce((sum,s) => sum + calcOOP(s.id), 0) / accepted.length)
        : 0;
    const cheapestOOP = accepted.length
        ? Math.min(...accepted.map(s => calcOOP(s.id)))

    return `
    <div class="stats-row">
        <div class="stat-card"><div class="stat-label">Accepted Schools</div><div class="stat-value green">${accepted.length}</div></div>

function updateAidForm() {
    const id = document.getElementById('aidSchoolSel')?.value;
    if (!id) return;
    const aid = window.aidPkgs[id] || {};
    document.getElementById('aid_pell').value         = aid.pell         !== undefined ? aid.pell : 7395;
    document.getElementById('aid_cal_grant').value    = aid.cal_grant    || 0;
    document.getElementById('aid_school_grants').value= aid.school_grants|| 0;
    document.getElementById('aid_work_study').value   = aid.work_study   || 0;
    document.getElementById('aid_loans').value        = aid.loans        || 0;
    document.getElementById('aid_other').value        = aid.other        || 0;
    liveCalcAid();
}

function liveCalcAid() {
    const id = document.getElementById('aidSchoolSel')?.value;
    if (!id) return;
    const coa   = BASE_COSTS[id] || 0;
    const pell  = parseFloat(document.getElementById('aid_pell').value)          || 0;
    const cal   = parseFloat(document.getElementById('aid_cal_grant').value)     || 0;
    const sg    = parseFloat(document.getElementById('aid_school_grants').value) || 0;
    const ws    = parseFloat(document.getElementById('aid_work_study').value)    || 0;
    const loans = parseFloat(document.getElementById('aid_loans').value)         || 0;
    const other = parseFloat(document.getElementById('aid_other').value)         || 0;
    const grants = pell + cal + sg + other;
    const totalAid = grants + ws + loans;
    const net = Math.max(0, coa - grants);
    const oop = Math.max(0, net - ws - loans);
    document.getElementById('calc_coa').textContent       = fmt(coa);
    document.getElementById('calc_total_aid').textContent = fmt(totalAid);
    document.getElementById('calc_net').textContent       = fmt(net);
    document.getElementById('calc_oop').textContent       = fmt(oop);
}

function saveAidPkg() {
    const id = document.getElementById('aidSchoolSel')?.value;
    if (!id) return;
    window.aidPkgs[id] = {
        pell:         parseFloat(document.getElementById('aid_pell').value)          || 0,
        cal_grant:    parseFloat(document.getElementById('aid_cal_grant').value)     || 0,
        school_grants:parseFloat(document.getElementById('aid_school_grants').value) || 0,
        work_study:   parseFloat(document.getElementById('aid_work_study').value)    || 0,
        loans:        parseFloat(document.getElementById('aid_loans').value)         || 0,
        other:        parseFloat(document.getElementById('aid_other').value)         || 0
    };
    saveLocalData();
    // Flash saved indicator
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ Saved!';
    setTimeout(() => { btn.textContent = orig; renderFull(); }, 800);
}

function clearAidForm() {
    ['aid_pell','aid_cal_grant','aid_school_grants','aid_work_study','aid_loans','aid_other']
        .forEach(id => { const el = document.getElementById(id); if(el) el.value = 0; });
    document.getElementById('aid_pell').value = 7395;
    liveCalcAid();
}

function initBarChart() {
    const ctx = document.getElementById('barChart');
    if (!ctx) return;
    if (barChartInstance) { barChartInstance.destroy(); barChartInstance = null; }

    const schools = aidShowAll
        ? window.schools
        : window.schools.filter(s => s.status === 'accepted');

    const sorted = [...schools].sort((a,b) => calcNetCost(a.id) - calcNetCost(b.id));

    const labels = sorted.map(s => s.name.replace('San Jose State','SJSU').replace('Sacramento State','Sac State').replace('Cal State Fullerton','CSUF').replace('UC Santa Barbara','UCSB').replace('UC Santa Cruz','UCSC').replace('UC Riverside','UCR').replace('UC Irvine','UCI').replace('Cal Poly SLO','Cal Poly'));

    const grantsData   = sorted.map(s => { const a=window.aidPkgs[s.id]||{}; return (a.pell||0)+(a.cal_grant||0)+(a.school_grants||0)+(a.other||0); });
    const workData     = sorted.map(s => (window.aidPkgs[s.id]||{}).work_study||0);
    const loansData    = sorted.map(s => (window.aidPkgs[s.id]||{}).loans||0);
    const oopData      = sorted.map(s => calcOOP(s.id));

    barChartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels,
            datasets: [
                { label: 'Grants', data: grantsData,  backgroundColor: 'rgba(0,255,136,0.7)' },
                { label: 'Work-Study', data: workData, backgroundColor: 'rgba(255,170,0,0.7)' },
                { label: 'Loans', data: loansData,    backgroundColor: 'rgba(255,136,0,0.7)' },
                { label: 'Out-of-Pocket', data: oopData, backgroundColor: 'rgba(255,51,51,0.7)' }

        },
        options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: {
                legend: { labels: { color: '#e0e6ed', font: { family: 'Poppins' } } },
                tooltip: {
                    callbacks: {
                        label: ctx => ` ${ctx.dataset.label}: $${ctx.raw.toLocaleString()}`

                }
            },
            scales: {
                x: { stacked: true, ticks: { color: '#8892a8', font: { family: 'Poppins', size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
                y: { stacked: true, ticks: { color: '#8892a8', callback: v => '$'+v.toLocaleString(), font: { family: 'Poppins' } }, grid: { color: 'rgba(255,255,255,0.05)' } }

function renderAidDeadlineTracker() {
    const schools = window.schools;

    let rows = '';
    schools.forEach(s => {
        const dl = aidDeadlines[s.id] || {};
        const received = dl.received || false;
        const deadline = dl.deadline || '';
        const days = daysUntil(deadline);

        let daysLabel = '<span class="deadline-urgency-gray">No deadline set</span>';
        if (days !== null) {
            if (days < 0)  daysLabel = `<span class="deadline-urgency-red">PAST DUE (${Math.abs(days)}d ago)</span>`;
            else if (days < 7)  daysLabel = `<span class="deadline-urgency-red">⚠️ ${days} days!</span>`;
            else if (days < 21) daysLabel = `<span class="deadline-urgency-yellow">${days} days</span>`;
            else                daysLabel = `<span class="deadline-urgency-green">${days} days</span>`;
        }

        rows += `
        <tr>
            <td><strong>${s.name}</strong></td>
            <td><span class="status-badge status-${s.status}">${s.status}</span></td>
            <td style="text-align:center;">
                <input type="checkbox" class="received-check" ${received?'checked':''} onchange="updateAidDeadline('${s.id}','received',this.checked)">
            </td>
            <td>
                <input type="date" value="${deadline}" style="width:150px;padding:5px 8px;font-size:0.85em;"
                    onchange="updateAidDeadline('${s.id}','deadline',this.value)">
            </td>
            <td>${daysLabel}</td>
        </tr>`;
    });

    return `
    <div class="card" style="margin-bottom:20px;">
        <h3>📅 Aid Deadline Tracker</h3>
        <p style="color:var(--text-muted);font-size:0.85em;margin-bottom:15px;">Check "Received?" when your aid offer arrives. Set a deadline to track urgency.</p>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr>
                    <th>School</th>
                    <th>Status</th>
                    <th style="text-align:center;">Aid Received?</th>
                    <th>Deadline to Accept/Decline</th>
                    <th>Days Until</th>
                </tr></thead>
                <tbody>${rows}</tbody>
            </table>
        </div>
    </div>`;
}

function updateAidDeadline(id, field, value) {
    if (!aidDeadlines[id]) aidDeadlines[id] = {};
    aidDeadlines[id][field] = value;
    saveLocalData();
    // Re-render just deadline section to avoid chart reset
    const panel = document.getElementById('financial-panel');

}

function renderDeadlineCountdown() {
    const today = new Date(); today.setHours(0,0,0,0);
    const deadline = new Date(2026,4,1);
    const daysLeft = Math.ceil((deadline - today) / 86400000);
    let cls = 'deadline-countdown-banner';
    if (daysLeft < 15) cls += ' danger';
    else if (daysLeft < 30) cls += ' warning';

    let html = `<div class="${cls}">`;
    html += `<h3>⏰ Decision Deadline Countdown</h3>`;
    html += `<p style="font-size:1.1em;margin-bottom:12px;"><strong>${daysLeft} days</strong> until May 1, 2026 — Intent to Enroll deadline</p>`;
    html += `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;">`;
    window.schools.filter(s => s.status === 'accepted').forEach(s => {
        html += `<div class="deadline-item"><span>${s.name}</span><span>${daysLeft} days</span></div>`;
    });
    html += `</div></div>`;
    return html;
}

function renderWeightedScores() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    if (!accepted.length) return '<div class="card"><h3>Weighted Scores</h3><p style="color:var(--text-muted);">No accepted schools yet.</p></div>';

    let html = `<div class="card"><h3>🏆 Weighted Decision Scores</h3>
    <div style="overflow-x:auto;"><table><thead><tr>
        <th>School</th>`;
    CRITERIA_KEYS.forEach(k => html += `<th>${CRITERIA_LABELS[k]}</th>`);
    html += `<th>Weighted Score</th></tr></thead><tbody>`;

    accepted.forEach(s => {
        const sc = s.scores || {};
        let ws = 0;
        CRITERIA_KEYS.forEach(k => {
            let v = sc[k] || 5;
            if (k === 'net_cost') v = 11 - v;
            ws += v;
        });
        ws = (ws / CRITERIA_KEYS.length).toFixed(1);
        html += `<tr><td><strong>${s.name}</strong></td>`;
        CRITERIA_KEYS.forEach(k => html += `<td><input type="number" min="1" max="10" value="${sc[k]||5}" style="width:60px;padding:4px;" onchange="updateScore('${s.id}','${k}',this.value)"></td>`);
        html += `<td><strong style="color:var(--success);">${ws}/10</strong></td></tr>`;
    });
    html += `</tbody></table></div></div>`;
    return html;
}

function updateScore(id, key, val) {
    const s = window.schools.find(x => x.id === id);
    if (s) { if (!s.scores) s.scores = {}; s.scores[key] = parseInt(val)||5; saveLocalData(); }
}

function renderComparisonMode() {
    let html = `<div class="card"><h3>⚖️ Side-by-Side Comparison</h3>`;
    html += `<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px;">
        <button onclick="quickTop3Score()">Top 3 by Score</button>
        <button class="secondary" onclick="quickTop3Cost()">Top 3 by Cost</button>
    </div>`;

    if (currentCompareSchools.length > 0) {
        html += `<div class="comparison-cards">`;
        const scoresArr = currentCompareSchools.map(id => {
            const s = window.schools.find(x => x.id === id);
            if (!s) return null;
            const sc = s.scores || {};
            let ws = 0;
            CRITERIA_KEYS.forEach(k => { let v=sc[k]||5; if(k==='net_cost') v=11-v; ws+=v; });
            return { id, school: s, weightedScore: ws/CRITERIA_KEYS.length, net: calcNetCost(id) };
        }).filter(Boolean);

        scoresArr.forEach((d, i) => {
            const rank = i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉';
            html += `<div class="comparison-card">
                <h4>${rank} ${d.school.name}</h4>
                <div class="comparison-item"><label>Weighted Score</label><div class="value">${d.weightedScore.toFixed(1)}/10</div></div>
                <div class="comparison-item"><label>Net Cost</label><div class="value" style="color:var(--success);">${fmt(d.net)}</div></div>
                <div class="comparison-item"><label>Program Quality</label><div class="value">${d.school.scores?.program_quality||5}/10</div></div>
                <div class="comparison-item"><label>Career Outcomes</label><div class="value">${d.school.scores?.career_outcomes||5}/10</div></div>
                <div class="comparison-item"><label>Gut Feeling</label><div class="value">${d.school.scores?.gut_feeling||5}/10</div></div>
            </div>`;
        });
        html += `</div>`;
    }
    html += `</div>`;
    return html;
}

function quickTop3Score() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    const sorted = [...accepted].sort((a,b) => {
        const sa = Object.values(a.scores||{}).reduce((x,y)=>x+y,0);
        const sb = Object.values(b.scores||{}).reduce((x,y)=>x+y,0);
        return sb - sa;
    });
    currentCompareSchools = sorted.slice(0,3).map(s=>s.id);
    renderFull();
}

function quickTop3Cost() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    const sorted = [...accepted].sort((a,b) => calcNetCost(a.id) - calcNetCost(b.id));
    currentCompareSchools = sorted.slice(0,3).map(s=>s.id);
    renderFull();
}

function renderDealBreakersChecklist() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    if (!accepted.length) return '';
    let html = `<div class="card"><h3>🚫 Deal-Breakers Checklist</h3>`;
    accepted.forEach(s => {
        const db = dealBreakers[s.id] || {};
        const eliminated = Object.values(db).some(v => v);
        html += `<div class="dealbreaker-section${eliminated?' eliminated':''}">
            <h4>${s.name}${eliminated?' — <span style="color:var(--danger);">ELIMINATED</span>':''}</h4>`;
        const labels = ['Too expensive','Program not strong enough','Too far from home','Campus vibe doesn\'t fit','Career outcomes below expectations','Other'];
        labels.forEach((lbl, idx) => {
            const key = `item_${idx}`;
            html += `<div class="dealbreaker-item">
                <input type="checkbox" id="db_${s.id}_${idx}" ${db[key]?'checked':''} onchange="updateDB('${s.id}','${key}',this.checked)">
                <label for="db_${s.id}_${idx}">${lbl}</label>
            </div>`;
        });
        html += `</div>`;
    });
    html += `</div>`;
    return html;
}

function updateDB(id, key, val) {
    if (!dealBreakers[id]) dealBreakers[id] = {};
    dealBreakers[id][key] = val;
    saveLocalData();
    renderFull();
}

    let html = `<div class="card"><h3>📓 Decision Journal</h3>
    <div style="margin-bottom:20px;">
        <div class="form-group">
            <label>Tag a School (Optional)</label>
            <select id="journalSchool" style="width:auto;">
                <option value="">— None —</option>
                ${window.schools.filter(s=>s.status==='accepted').map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
            </select>
        </div>
        <div class="form-group">
            <label>What are you thinking about today? (max 500 chars)</label>
            <textarea id="journalText" maxlength="500" style="min-height:100px;" placeholder="Write your thoughts..."></textarea>
        </div>
        <button onclick="addJournalEntry()">➕ Add Entry</button>
    </div>
    <div>`;

    if (!journalEntries.length) {
        html += `<p style="color:var(--text-muted);font-style:italic;">No entries yet. Start journaling your decision process!</p>`;
    }
    [...journalEntries].reverse().forEach((e, i) => {
        const realIdx = journalEntries.length - 1 - i;
        const s = window.schools.find(x => x.id === e.school);
        html += `<div class="journal-entry">
            <div class="journal-entry-date">📅 ${e.date}</div>
            <div class="journal-entry-text">${e.text}</div>
            ${s ? `<span class="journal-entry-tag">🏫 ${s.name}</span>` : ''}
            <button class="secondary" style="font-size:0.75em;padding:3px 8px;margin-top:8px;" onclick="deleteJournal(${realIdx})">Delete</button>
        </div>`;
    });
    html += `</div></div>`;
    return html;
}

function addJournalEntry() {
    const text = document.getElementById('journalText')?.value?.trim();
    const school = document.getElementById('journalSchool')?.value;
    if (!text) { alert('Please write something first!'); return; }
    journalEntries.push({ date: todayStr(), text, school: school || null });
    saveLocalData();
    renderFull();
}

function deleteJournal(idx) {
    journalEntries.splice(idx, 1);
    saveLocalData();
    renderFull();
}

function renderRadarSection() {
    const accepted = window.schools.filter(s => s.status === 'accepted');
    if (!accepted.length) return '';
    const s = accepted[0];
    const sc = s.scores || {};
    let html = `<div class="card"><h3>🕸️ Criteria Breakdown — ${s.name}</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;">`;
    CRITERIA_KEYS.forEach(k => {
        const score = sc[k] || 5;
        const pct = score * 10;
        html += `<div style="background:var(--surface-light);padding:12px;border-radius:6px;">
            <div style="color:var(--text-muted);font-size:0.85em;margin-bottom:8px;">${CRITERIA_LABELS[k]}</div>
            <div style="width:100%;height:8px;background:rgba(0,212,255,0.15);border-radius:4px;overflow:hidden;">
                <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent-dark),var(--accent));transition:width 0.3s;"></div>
            </div>
            <div style="margin-top:6px;color:var(--accent);font-weight:600;">${score}/10</div>
        </div>`;
    });
    html += `</div></div>`;
    return html;
}

// ============================================================
// SCHOLARSHIP HUNTER TAB — UNCHANGED FROM ORIGINAL
// ============================================================
function renderScholarshipTab() {
    let html = '';
    html += renderProfileSummary();
    html += renderScholarshipStats();
    html += renderScholarshipFilters();
    html += renderScholarshipTable();
    return html;
}

function renderProfileSummary() {
    return `<div class="scholarship-card">
        <h3>👤 Your Profile</h3>
        <div class="scholarship-card-row"><div class="scholarship-card-label">Name</div><div class="scholarship-card-value">Michael Sarmento</div></div>
        <div class="scholarship-card-row"><div class="scholarship-card-label">Major</div><div class="scholarship-card-value">Business Analytics Transfer</div></div>
        <div class="scholarship-card-row"><div class="scholarship-card-label">Heritage</div><div class="scholarship-card-value">Filipino / Portuguese</div></div>
        <div class="scholarship-card-row"><div class="scholarship-card-label">GPA / SAI</div><div class="scholarship-card-value">3.49 / -$1,500</div></div>
        <div class="scholarship-card-row"><div class="scholarship-card-label">Student Type</div><div class="scholarship-card-value">Community College Transfer · Non-traditional (age 27)</div></div>
        <div class="scholarship-card-row"><div class="scholarship-card-label">Time Budget</div><div class="scholarship-card-value">~5 hours/week for applications</div></div>
    </div>`;
}

function renderScholarshipStats() {
    const submitted = SCHOLARSHIP_DB.filter(s => s.status==='submitted').length;
    const won       = SCHOLARSHIP_DB.filter(s => s.status==='won').length;
    const total     = SCHOLARSHIP_DB.reduce((s,x) => s+x.amount, 0);
    const wonVal    = SCHOLARSHIP_DB.filter(s=>s.status==='won').reduce((s,x)=>s+x.amount,0);
    return `<div class="stats-row">
        <div class="stat-card"><div class="stat-label">Scholarships Found</div><div class="stat-value">${SCHOLARSHIP_DB.length}</div></div>
        <div class="stat-card"><div class="stat-label">Total Potential Value</div><div class="stat-value amount-currency">$${(total/1000).toFixed(0)}K</div></div>
        <div class="stat-card"><div class="stat-label">Submitted</div><div class="stat-value">${submitted}</div></div>
        <div class="stat-card"><div class="stat-label">Won</div><div class="stat-value green">${fmt(wonVal)}</div></div>
    </div>`;
}

function renderScholarshipFilters() {
    return `<div class="scholarship-filters">
        <div class="scholarship-filters filter-group"><label>Essay?</label>
            <select id="fEssay"><option value="">All</option><option value="yes">Required</option><option value="no">Not Required</option></select>
        </div>
        <div class="scholarship-filters filter-group"><label>Amount</label>
            <select id="fAmount"><option value="">All</option><option value="5k">$5K+</option><option value="1k5k">$1K–$5K</option><option value="sub1k">&lt;$1K</option></select>
        </div>
        <div class="scholarship-filters filter-group"><label>Status</label>
            <select id="fStatus"><option value="">All</option><option value="not_started">Not Started</option><option value="in_progress">In Progress</option><option value="submitted">Submitted</option><option value="won">Won!</option></select>
        </div>
        <button class="secondary" onclick="applySchFilters()">Apply</button>
    </div>`;
}

let schFilter = { essay:'', amount:'', status:'' };

function applySchFilters() {
    schFilter.essay  = document.getElementById('fEssay')?.value  || '';
    schFilter.amount = document.getElementById('fAmount')?.value || '';
    schFilter.status = document.getElementById('fStatus')?.value || '';
    const tbody = document.getElementById('schTableBody');
    if (!tbody) return;
    tbody.innerHTML = buildSchRows();
}

function renderScholarshipTable() {
    return `<div style="overflow-x:auto;">
    <table>
        <thead><tr>
            <th>Scholarship</th>
            <th>Amount</th>
            <th>Deadline</th>
            <th>Essay?</th>
            <th>Time</th>
            <th>Match</th>
            <th>Status</th>
            <th>$/hr ROI</th>
            <th>Link</th>
        </tr></thead>
        <tbody id="schTableBody">${buildSchRows()}</tbody>
    </table></div>`;
}

function buildSchRows() {
    let list = [...SCHOLARSHIP_DB];
    if (schFilter.essay === 'yes')   list = list.filter(s => s.essay);
    if (schFilter.essay === 'no')    list = list.filter(s => !s.essay);
    if (schFilter.amount === '5k')   list = list.filter(s => s.amount >= 5000);
    if (schFilter.amount === '1k5k') list = list.filter(s => s.amount >= 1000 && s.amount < 5000);
    if (schFilter.amount === 'sub1k')list = list.filter(s => s.amount < 1000);
    if (schFilter.status)            list = list.filter(s => s.status === schFilter.status);
    list.sort((a,b) => b.match - a.match);

    return list.map(sch => {
        const hrs = parseFloat(sch.time) || 1;
        const roi = Math.round(sch.amount / hrs);
        const mc  = sch.match >= 70 ? 'match-high' : sch.match >= 40 ? 'match-medium' : 'match-low';
        return `<tr>
            <td><strong>${sch.name}</strong></td>
            <td class="amount-currency">${fmt(sch.amount)}</td>
            <td>${sch.deadline}</td>
            <td>${sch.essay ? '✅' : '—'}</td>
            <td>${sch.time}</td>
            <td><span class="match-badge ${mc}">${sch.match}%</span></td>
            <td>
                <select class="status-select" onchange="updateSchStatus(${sch.id},this.value)">
                    <option value="not_started" ${sch.status==='not_started'?'selected':''}>Not Started</option>
                    <option value="in_progress" ${sch.status==='in_progress'?'selected':''}>In Progress</option>
                    <option value="submitted"   ${sch.status==='submitted'  ?'selected':''}>Submitted</option>
                    <option value="won"         ${sch.status==='won'        ?'selected':''}>Won! 🎉</option>
                </select>
            </td>
            <td style="color:var(--text-muted);">$${roi}/hr</td>
            <td><button class="secondary" style="font-size:0.8em;padding:5px 10px;" onclick="window.open('${sch.link}','_blank')">Visit</button></td>
        </tr>`;
    }).join('');
}

function updateSchStatus(id, status) {
    const sch = SCHOLARSHIP_DB.find(s => s.id === id);
    if (sch) { sch.status = status; saveLocalData(); renderFull(); }
}

// ============================================================
// KICK OFF
// ============================================================
boot();
</script>
